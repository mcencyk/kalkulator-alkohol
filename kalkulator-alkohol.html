<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kalkulator Alkoholu</title>
  <link rel="icon" type="image/svg+xml" href="logo.svg" />
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 24px 16px;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
    }
    .app-layout {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }
    .app-inputs { flex: 1; min-width: 0; }
    .app-result {
      width: 260px;
      flex-shrink: 0;
      position: sticky;
      top: 24px;
    }
    @media (max-width: 760px) {
      .app-layout { flex-direction: column-reverse; }
      .app-result { width: 100%; position: static; }
    }
    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 4px;
      color: #f8fafc;
    }
    .subtitle {
      font-size: 0.875rem;
      color: #94a3b8;
      margin-bottom: 28px;
    }
    .card {
      background: #1e293b;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      border: 1px solid #334155;
    }
    .card h2 {
      font-size: 0.9rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 16px;
    }
    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
      min-width: 120px;
    }
    label {
      font-size: 0.8rem;
      color: #94a3b8;
      font-weight: 500;
    }
    input, select {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #f1f5f9;
      padding: 10px 12px;
      font-size: 0.9rem;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, select:focus {
      border-color: #3b82f6;
    }
    .gender-btns {
      display: flex;
      gap: 8px;
    }
    .gender-btn {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #94a3b8;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.15s;
      text-align: center;
    }
    .gender-btn.active {
      background: #1d4ed8;
      border-color: #3b82f6;
      color: #fff;
    }
    .drink-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(84px, 1fr));
      gap: 8px;
    }
    .drink-card {
      position: relative;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 12px 6px 8px;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      user-select: none;
    }
    .drink-card:hover { border-color: #3b82f6; background: #1e293b; }
    .drink-card.active { border-color: #3b82f6; background: #1e3a5f; }
    .drink-emoji { font-size: 1.8rem; display: block; margin-bottom: 4px; }
    .drink-name { font-size: 0.7rem; font-weight: 600; color: #e2e8f0; display: block; }
    .drink-sub { font-size: 0.62rem; color: #64748b; display: block; margin-top: 2px; }
    .drink-badge {
      position: absolute;
      top: -7px; right: -7px;
      background: #3b82f6;
      color: #fff;
      border-radius: 99px;
      min-width: 20px; height: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; font-weight: 700;
    }
    .drink-minus {
      display: block;
      margin: 6px auto 0;
      background: #1e40af;
      border: none;
      border-radius: 4px;
      color: #93c5fd;
      cursor: pointer;
      width: 24px; height: 20px;
      font-size: 1rem; line-height: 1;
      transition: background 0.15s;
    }
    .drink-minus:hover { background: #dc2626; color: #fff; }

    .result-panel {
      border-radius: 12px;
      padding: 20px 16px;
      border: 2px solid;
      text-align: center;
    }
    .result-panel.safe { border-color: #16a34a; background: #14532d22; }
    .result-panel.warn { border-color: #d97706; background: #92400e22; }
    .result-panel.danger { border-color: #dc2626; background: #7f1d1d22; }

    .bac-value {
      font-size: 3rem;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 8px;
    }
    .safe .bac-value { color: #4ade80; }
    .warn .bac-value { color: #fbbf24; }
    .danger .bac-value { color: #f87171; }

    .bac-label {
      font-size: 0.85rem;
      color: #94a3b8;
      margin-bottom: 12px;
    }
    .status-badge {
      display: inline-block;
      padding: 5px 14px;
      border-radius: 99px;
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 16px;
    }
    .safe .status-badge { background: #16a34a; color: #fff; }
    .warn .status-badge { background: #d97706; color: #fff; }
    .danger .status-badge { background: #dc2626; color: #fff; }

    .drive-info {
      font-size: 1rem;
      color: #e2e8f0;
    }
    .drive-time {
      font-size: 1.5rem;
      font-weight: 700;
      color: #f8fafc;
      margin-top: 4px;
    }

    .timeline {
      margin-top: 16px;
    }
    .timeline h3 {
      font-size: 0.8rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
    }
    .tl-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
      font-size: 0.8rem;
    }
    .tl-hour {
      color: #94a3b8;
      width: 36px;
      text-align: right;
      flex-shrink: 0;
    }
    .tl-bar-wrap {
      flex: 1;
      background: #0f172a;
      border-radius: 4px;
      height: 8px;
      overflow: hidden;
    }
    .tl-bar {
      height: 100%;
      border-radius: 4px;
      transition: width 0.3s;
    }
    .tl-val {
      width: 48px;
      text-align: right;
      color: #94a3b8;
      flex-shrink: 0;
    }

    .disclaimer {
      font-size: 0.75rem;
      color: #475569;
      text-align: center;
      margin-top: 8px;
      line-height: 1.5;
    }

    @media (max-width: 480px) {
      .row { flex-direction: column; }
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
      animation: logoIn 0.5s ease-out;
    }
    .logo-wrap h1 { margin-bottom: 2px; }
    .logo-wrap .subtitle { margin-bottom: 0; }
    #logo-gear {
      transform-box: fill-box;
      transform-origin: center;
      animation: gearSpin 6s linear infinite;
    }
    @keyframes gearSpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes logoIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .time-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(to right, #3b82f6 0%, #3b82f6 var(--val, 0%), #334155 var(--val, 0%), #334155 100%);
      outline: none;
      cursor: pointer;
      border: none;
      padding: 0;
    }
    .time-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px; height: 20px;
      border-radius: 50%;
      background: #3b82f6;
      border: 2px solid #1e40af;
      cursor: pointer;
      box-shadow: 0 0 0 3px #1e3a5f;
    }
    .time-slider::-moz-range-thumb {
      width: 20px; height: 20px;
      border-radius: 50%;
      background: #3b82f6;
      border: 2px solid #1e40af;
      cursor: pointer;
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const DRINKS = [
  { label: 'Piwo',       sub: '500ml · 5%',  ml: 500, perc: 5,  emoji: '🍺' },
  { label: 'Piwo',       sub: '330ml · 5%',  ml: 330, perc: 5,  emoji: '🫙' },
  { label: 'Piwo mocne', sub: '500ml · 8%',  ml: 500, perc: 8,  emoji: '🍻' },
  { label: 'Wino',       sub: '150ml · 12%', ml: 150, perc: 12, emoji: '🍷' },
  { label: 'Wino',       sub: '200ml · 13%', ml: 200, perc: 13, emoji: '🍾' },
  { label: 'Wódka',      sub: '50ml · 40%',  ml: 50,  perc: 40, emoji: '🥃' },
  { label: 'Whisky',     sub: '50ml · 40%',  ml: 50,  perc: 40, emoji: '🫗' },
  { label: 'Szampan',    sub: '150ml · 11%', ml: 150, perc: 11, emoji: '🥂' },
  { label: 'Nalewka',    sub: '50ml · 35%',  ml: 50,  perc: 35, emoji: '🍯' },
  { label: 'Własny',     sub: 'wpisz sam',   ml: 0,   perc: 0,  emoji: '✏️', custom: true },
];

const ELIMINATION = 0.15; // ‰ per hour (Widmark typical)
const LEGAL_LIMIT = 0.2;  // ‰ - Poland (driving prohibited above this)
const DUI_LIMIT   = 0.5;  // ‰ - Poland (criminal offence above this)

function calcAlcoholGrams(ml, perc) {
  return ml * (perc / 100) * 0.789;
}

function calcBAC(grams, weightKg, gender) {
  const r = gender === 'male' ? 0.7 : 0.6;
  return grams / (weightKg * r);
}

function fmt(bac) {
  return bac.toFixed(2) + ' ‰';
}

function formatHours(h) {
  if (h <= 0) return 'Teraz';
  const hh = Math.floor(h);
  const mm = Math.round((h - hh) * 60);
  if (hh === 0) return `${mm} min`;
  if (mm === 0) return `${hh} godz.`;
  return `${hh} godz. ${mm} min`;
}

function barColor(bac) {
  if (bac <= LEGAL_LIMIT) return '#4ade80';
  if (bac <= DUI_LIMIT) return '#fbbf24';
  return '#f87171';
}

function App() {
  const [weight, setWeight] = React.useState(75);
  const [gender, setGender] = React.useState('male');
  const [drinkingHoursAgo, setDrinkingHoursAgo] = React.useState(0);
  const [food, setFood] = React.useState('none');
  const [drinkCounts, setDrinkCounts] = React.useState({});
  const [customMl, setCustomMl] = React.useState(500);
  const [customPerc, setCustomPerc] = React.useState(5);

  const customIdx = DRINKS.length - 1;

  function addDrink(i) {
    setDrinkCounts(c => ({ ...c, [i]: (c[i] || 0) + 1 }));
  }
  function removeDrink(i) {
    setDrinkCounts(c => {
      const next = { ...c, [i]: (c[i] || 0) - 1 };
      if (next[i] <= 0) delete next[i];
      return next;
    });
  }

  const totalGrams = DRINKS.reduce((sum, drink, i) => {
    const count = drinkCounts[i] || 0;
    if (!count) return sum;
    if (drink.custom) return sum + calcAlcoholGrams(customMl, customPerc) * count;
    return sum + calcAlcoholGrams(drink.ml, drink.perc) * count;
  }, 0);

  const foodFactor = { none: 1.0, snack: 0.85, meal: 0.70, heavy: 0.60 }[food];
  const bac0 = weight > 0 ? calcBAC(totalGrams, weight, gender) * foodFactor : 0;
  const currentBAC = Math.max(0, bac0 - ELIMINATION * drinkingHoursAgo);

  const hoursToLegal = currentBAC > LEGAL_LIMIT
    ? (currentBAC - LEGAL_LIMIT) / ELIMINATION
    : 0;

  const driveTime = new Date();
  driveTime.setMinutes(driveTime.getMinutes() + Math.round(hoursToLegal * 60));

  let panelClass = 'safe';
  let statusText = 'Mozesz prowadzic';
  if (currentBAC > DUI_LIMIT) { panelClass = 'danger'; statusText = 'Stan nietrzezwosci!'; }
  else if (currentBAC > LEGAL_LIMIT) { panelClass = 'warn'; statusText = 'Nie mozna prowadzic'; }

  const maxBAC = Math.max(bac0, 0.5);
  const timelineHours = Math.ceil(bac0 / ELIMINATION) + 1;
  const timelinePoints = Array.from({ length: Math.min(timelineHours, 24) + 1 }, (_, i) => ({
    h: i,
    bac: Math.max(0, bac0 - ELIMINATION * (drinkingHoursAgo + i)),
  }));

  return (
    <div className="container">
      <div className="logo-wrap">
        <svg width="68" height="64" viewBox="0 0 34 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M5.36761 21.3333H3.91174C2.31028 21.3333 1 19.9619 1 18.2857V15.3447C1 14.3238 1.48044 13.379 2.29572 12.8152L5.36761 10.6666L7.42039 8.51807C7.97362 7.93902 8.70156 7.61902 9.47317 7.61902H20.1592C20.9309 7.61902 21.6734 7.93902 22.212 8.51807L27.1765 13.7143L30.8016 14.659C32.0974 14.9943 33 16.2133 33 17.6152V19.8095C33 20.6476 32.3449 21.3333 31.5441 21.3333H30.0883" stroke="#CCDFE9" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
          <path d="M20.1867 22C20.1867 23.4912 18.9779 24.7 17.4867 24.7C15.9955 24.7 14.7867 23.4912 14.7867 22C14.7867 20.5088 15.9955 19.3 17.4867 19.3C18.9779 19.3 20.1867 20.5088 20.1867 22Z" stroke="#CCDFE9" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
          <path id="logo-gear" d="M19.697 14.2308C19.452 13.4958 18.7641 13 17.9893 13H16.9841C16.2093 13 15.5214 13.4958 15.2764 14.2308L14.9311 15.2667C14.2018 15.5437 13.5292 15.9357 12.9354 16.4207L11.8635 16.2013C11.1044 16.046 10.3311 16.3938 9.94376 17.0648L9.44113 17.9354C9.05374 18.6063 9.13917 19.4499 9.65321 20.0296L10.3784 20.8475C10.3181 21.2227 10.2867 21.6077 10.2867 22C10.2867 22.3923 10.3181 22.7773 10.3784 23.1525L9.65321 23.9704C9.13917 24.5501 9.05374 25.3937 9.44113 26.0646L9.94376 26.9352C10.3311 27.6062 11.1044 27.954 11.8635 27.7987L12.9354 27.5793C13.5292 28.0643 14.2018 28.4563 14.9311 28.7333L15.2764 29.7692C15.5214 30.5042 16.2093 31 16.9841 31H17.9893C18.7641 31 19.452 30.5042 19.697 29.7692L20.0423 28.7333C20.7715 28.4563 21.4441 28.0643 22.0379 27.5794L23.1099 27.7988C23.869 27.9541 24.6422 27.6063 25.0296 26.9354L25.5323 26.0648C25.9196 25.3938 25.8342 24.5502 25.3202 23.9705L24.5949 23.1526C24.6553 22.7773 24.6867 22.3923 24.6867 22C24.6867 21.6077 24.6553 21.2227 24.5949 20.8475L25.3202 20.0296C25.8342 19.4499 25.9196 18.6063 25.5323 17.9354L25.0296 17.0648C24.6422 16.3938 23.869 16.046 23.1099 16.2013L22.038 16.4207C21.4442 15.9357 20.7716 15.5437 20.0423 15.2667L19.697 14.2308Z" stroke="#CCDFE9" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
        <div>
          <h1>Kalkulator Alkoholu</h1>
          <p className="subtitle">Kiedy moge prowadzic samochod? (prawo polskie)</p>
        </div>
      </div>

      <div className="app-layout">
      <div className="app-inputs">
      {/* Dane osoby */}
      <div className="card">
        <h2>Dane osoby</h2>
        <div className="row">
          <div className="field">
            <label>Waga (kg)</label>
            <input
              type="number" min="30" max="250"
              value={weight}
              onChange={e => setWeight(Number(e.target.value))}
            />
          </div>
          <div className="field">
            <label>Plec</label>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
              {[
                { val: 'male',   emoji: '👨', label: 'Mężczyzna' },
                { val: 'female', emoji: '👩', label: 'Kobieta' },
              ].map(g => (
                <div key={g.val}
                  className={`drink-card ${gender === g.val ? 'active' : ''}`}
                  onClick={() => setGender(g.val)}
                >
                  <span className="drink-emoji">{g.emoji}</span>
                  <span className="drink-name">{g.label}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>

      {/* Napoje */}
      <div className="card">
        <h2>Wypite napoje</h2>
        <div className="drink-grid">
          {DRINKS.map((drink, i) => {
            const count = drinkCounts[i] || 0;
            return (
              <div
                key={i}
                className={`drink-card ${count > 0 ? 'active' : ''}`}
                onClick={() => addDrink(i)}
              >
                {count > 0 && <span className="drink-badge">{count}</span>}
                <span className="drink-emoji">{drink.emoji}</span>
                <span className="drink-name">{drink.label}</span>
                <span className="drink-sub">{drink.sub}</span>
                {count > 0 && (
                  <button className="drink-minus" onClick={e => { e.stopPropagation(); removeDrink(i); }}>−</button>
                )}
              </div>
            );
          })}
        </div>
        {(drinkCounts[customIdx] || 0) > 0 && (
          <div style={{ display: 'flex', gap: 8, marginTop: 12, alignItems: 'center' }}>
            <span style={{ fontSize: '0.8rem', color: '#94a3b8', flexShrink: 0 }}>Własny napój:</span>
            <input type="number" placeholder="ml" min="0" value={customMl}
              onChange={e => setCustomMl(Number(e.target.value))}
              style={{ maxWidth: 80 }} />
            <input type="number" placeholder="%" min="0" max="100" value={customPerc}
              onChange={e => setCustomPerc(Number(e.target.value))}
              style={{ maxWidth: 70 }} />
          </div>
        )}
      </div>

      {/* Jedzenie */}
      <div className="card">
        <h2>Jedzenie</h2>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 8 }}>
          {[
            { val: 'none',  emoji: '🫙', label: 'Pusty żołądek', desc: '100%' },
            { val: 'snack', emoji: '🥨', label: 'Przekąska',     desc: '-15%' },
            { val: 'meal',  emoji: '🍱', label: 'Posiłek',       desc: '-30%' },
            { val: 'heavy', emoji: '🥩', label: 'Obfity',        desc: '-40%' },
          ].map(f => (
            <div
              key={f.val}
              className={`drink-card ${food === f.val ? 'active' : ''}`}
              onClick={() => setFood(f.val)}
            >
              <span className="drink-emoji">{f.emoji}</span>
              <span className="drink-name">{f.label}</span>
              <span className="drink-sub">{f.desc}</span>
            </div>
          ))}
        </div>
      </div>

      {/* Czas od picia */}
      <div className="card">
        <h2>Czas od ostatniego drinka</h2>
        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 10 }}>
          <span style={{ fontSize: '0.8rem', color: '#94a3b8' }}>Ile godzin temu skonczylem pic?</span>
          <span style={{ fontSize: '0.9rem', fontWeight: 700, color: '#f1f5f9' }}>
            {drinkingHoursAgo === 0 ? 'Teraz' : formatHours(drinkingHoursAgo)}
          </span>
        </div>
        <input
          type="range" min="0" max="24" step="0.5"
          value={drinkingHoursAgo}
          onChange={e => setDrinkingHoursAgo(Number(e.target.value))}
          className="time-slider"
          style={{ '--val': `${(drinkingHoursAgo / 24) * 100}%` }}
        />
        <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 4 }}>
          <span style={{ fontSize: '0.65rem', color: '#475569' }}>0h</span>
          <span style={{ fontSize: '0.65rem', color: '#475569' }}>24h</span>
        </div>
      </div>

      </div>{/* end app-inputs */}
      <div className="app-result">
      {/* Wynik */}
      <div className={`result-panel ${panelClass}`}>
        <div className="bac-value">{fmt(currentBAC)}</div>
        <div className="bac-label">Szacowane stezenie alkoholu we krwi</div>
        <div className="status-badge">{statusText}</div>
        {currentBAC > LEGAL_LIMIT ? (
          <div>
            <div className="drive-info">Mozesz prowadzic za:</div>
            <div className="drive-time">{formatHours(hoursToLegal)}</div>
            <div className="drive-info" style={{ fontSize: '0.8rem', marginTop: 6, color: '#94a3b8' }}>
              ok. {driveTime.toLocaleTimeString('pl-PL', { hour: '2-digit', minute: '2-digit' })}
            </div>
          </div>
        ) : (
          <div className="drive-info" style={{ color: '#4ade80' }}>
            Stezenie ponizej limitu 0,2 ‰
          </div>
        )}

        {/* Timeline */}
        {bac0 > 0 && (
          <div className="timeline">
            <h3>Spodek stezenia od teraz</h3>
            {timelinePoints.map(({ h, bac }) => (
              <div className="tl-row" key={h}>
                <span className="tl-hour">+{h}h</span>
                <div className="tl-bar-wrap">
                  <div className="tl-bar" style={{
                    width: `${Math.min(100, (bac / Math.max(maxBAC, 0.01)) * 100)}%`,
                    background: barColor(bac),
                  }} />
                </div>
                <span className="tl-val">{bac > 0 ? bac.toFixed(2) : '0.00'} ‰</span>
              </div>
            ))}
          </div>
        )}
      </div>

      </div>{/* end app-result */}
      </div>{/* end app-layout */}

      <p className="disclaimer">
        Obliczenia oparte na wzorze Widmarka (wspolczynnik eliminacji 0,15 ‰/h).<br/>
        Wynik jest szacunkowy i moze sie roznic w zaleznosci od wielu czynnikow.<br/>
        <strong>Limit w Polsce: 0,2 ‰ (prawo jazdy), 0,5 ‰ (przestepstwo).</strong><br/>
        Nie polegaj na tym kalkulatorze przy decyzji o prowadzeniu pojazdu.
      </p>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
